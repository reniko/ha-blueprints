# Motion-Triggered Light with Bypass (v1.1)

# This blueprint triggers a light when motion is detected, with a bypass option.

# Configuration Example:
# ```yaml
# automation:
#   - alias: 'Motion Light'
#     trigger:
#       platform: state
#       entity_id: binary_sensor.motion_sensor
#       to: 'on'
#     action:
#       service: light.turn_on
#       target:
#         entity_id: light.your_light_entity
# ```
blueprint:
  name: Motion-Triggered Light with Bypass (v1.1)
  description: Turns the light on/off based on motion and ambient light. Includes a physical bypass switch (e.g. Shelly Input) with an optional auto-off timer.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor (or Group)
      selector:
        entity:
          domain: binary_sensor
          device_class: occupancy
    target_light:
      name: Target Light
      selector:
        entity:
          domain: light
    time_delay_seconds:
      name: Turn-off Delay (Seconds)
      description: How long should the light stay on after the LAST motion was detected?
      default: 15
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: s
    illuminance_sensor:
      name: Illuminance Sensor (Lux)
      selector:
        entity:
          domain: sensor
          device_class: illuminance
    illuminance_cutoff:
      name: Illuminance Threshold
      description: Below which lux value should the light turn on?
      default: 10
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lx
    bypass_switch:
      name: Manual Switch (Bypass)
      description: e.g. the Shelly Input (binary_sensor). If this is 'on', motion is ignored.
      selector:
        entity:
          domain:
            - binary_sensor
            - switch
            - input_boolean
    bypass_auto_off_minutes:
      name: Bypass Auto-Off (Minutes)
      description: After how many minutes should the bypass (always-on mode) be canceled? (0 = infinite)
      default: 0
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: min

mode: restart
max_exceeded: silent

variables:
  lux_sensor: !input illuminance_sensor
  lux_threshold: !input illuminance_cutoff
  light_entity: !input target_light
  bypass_entity: !input bypass_switch
  auto_off_min: !input bypass_auto_off_minutes

trigger:
  # 1. Motion detected
  - platform: state
    entity_id: !input motion_sensor
    to: 'on'
    id: 'motion_on'

  # 2. No more motion (for the configured delay)
  - platform: state
    entity_id: !input motion_sensor
    to: 'off'
    for:
      seconds: !input time_delay_seconds
    id: 'motion_off'

  # 3. Physical switch turned on (Bypass On)
  - platform: state
    entity_id: !input bypass_switch
    to: 'on'
    id: 'bypass_on'

  # 4. Physical switch turned off (Bypass Off)
  - platform: state
    entity_id: !input bypass_switch
    to: 'off'
    id: 'bypass_off'

action:
  - choose:
      # ==========================================
      # SCENARIO A: MANUAL SWITCH IS TURNED ON
      # ==========================================
      - conditions:
          - condition: trigger
            id: 'bypass_on'
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_light
          # If Auto-Off > 0, wait and then turn off
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ auto_off_min | float > 0 }}"
                sequence:
                  - delay:
                      minutes: "{{ auto_off_min | int }}"
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light

      # ==========================================
      # SCENARIO B: MANUAL SWITCH IS TURNED OFF
      # ==========================================
      - conditions:
          - condition: trigger
            id: 'bypass_off'
        sequence:
          # If switch is turned off, turn off light (unless there is still motion)
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input motion_sensor
                    state: 'on'
                sequence:
                  # Motion still present -> keep light on
                  - delay: 0
            default:
              - service: light.turn_off
                target:
                  entity_id: !input target_light

      # ==========================================
      # SCENARIO C: MOTION IS DETECTED
      # ==========================================
      - conditions:
          - condition: trigger
            id: 'motion_on'
          # Ignore motion if manual switch is on
          - condition: state
            entity_id: !input bypass_switch
            state: 'off'
          # Turn on only if it is dark OR the light is already on
          - condition: template
            value_template: >
              {{ states(lux_sensor) | float(2000) < lux_threshold | float
                 or is_state(light_entity, 'on') }}
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_light

      # ==========================================
      # SCENARIO D: MOTION HAS ENDED (TIME DELAY)
      # ==========================================
      - conditions:
          - condition: trigger
            id: 'motion_off'
          # Turn off only if the manual switch is NOT on
          - condition: state
            entity_id: !input bypass_switch
            state: 'off'
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input target_light

blueprint:
  name: Climate Control (Climate + Heater + Vent) with PV/Forecast, Logging & Push (v 2.4.1)
  description: >
    Controls a climate entity and/or an external heater (switch/plug) based on
    inside/outside temperatures, prioritizes PV energy usage, optionally uses
    forecast to pre-heat/pre-cool, and prefers ventilation (fan-only) when
    outside conditions are favorable.

    Adds: EVCC PV surplus option.

    Changes in v2.4.0:
    - removed persistent notification output
    - keeps detailed logbook entries for debugging
    - optional push notify only on actual mode changes
  domain: automation
  input:
    climate_entity:
      name: Climate Entity (optional)
      description: >
        Climate entity to control. Needed for fan-only ventilation and for
        heating/cooling via HVAC modes. If you only use an external heater
        switch, you can still keep this for ventilation (fan_only), or leave
        empty to run heater-only.
      default: []
      selector:
        entity:
          filter:
            - domain: climate
          multiple: true

    heater_switch:
      name: External Heater Switch / Plug (optional)
      description: >
        Switch controlling the external heater (e.g., Shelly Plug for your
        600W/500W heater). If set, HEAT mode will prefer this switch over
        climate heating.
      default: []
      selector:
        entity:
          filter:
            - domain: switch
          multiple: true

    vent_switch:
      name: Ventilation Switch (optional)
      description: >
        Optional separate ventilation switch (e.g., extractor fan).
        If not set, ventilation uses climate fan_only.
      default: []
      selector:
        entity:
          filter:
            - domain: switch
          multiple: true

    inside_temperature_sensor:
      name: Inside Temperature Sensor (°C)
      description: Sensor that reports the inside temperature.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature

    outside_temperature_sensor:
      name: Outside Temperature Sensor (°C)
      description: Sensor that reports the outside temperature.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature

    weather_forecast_max_sensor:
      name: Weather Forecast Max Temperature Sensor (°C) (optional)
      description: >
        Sensor providing forecasted max temperature for the day. Used to decide
        proactive heating/cooling. Leave empty if you don't use forecast.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
          multiple: true

    pv_surplus_enable_boolean:
      name: EVCC PV surplus enable (input_boolean/switch) (optional)
      description: >
        If set, PV-based preemptive heating/cooling and forecast+PV actions are
        ONLY allowed when this entity is ON. Intended for evcc surplus control.

        IMPORTANT:
        When this entity is configured, these parameters are ignored:
        - minimum_pv_surplus_for_preemptive_heating
        - minimum_pv_surplus_for_preemptive_cooling

        The remaining surplus sensor (kWh) is still used as safety limit. If
        empty, the blueprint falls back to pv_surplus_sensor thresholds (legacy
        behavior).
      default: null
      selector:
        entity:
          filter:
            - domain: input_boolean
            - domain: switch
          multiple: false

    pv_surplus_sensor:
      name: PV current available Surplus Sensor (W) (optional)
      description: >
        Sensor showing current available PV energy surplus (W). Leave empty if
        unused.
        NOTE: Ignored if EVCC PV surplus enable is configured.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
          multiple: true

    pv_remaining_surplus_sensor:
      name: PV Remaining Surplus Sensor (kWh) (optional)
      description: >
        Sensor showing remaining PV energy surplus for today (kWh). Leave empty
        if unused.
        NOTE: Ignored if EVCC PV surplus enable is configured.
      default: []
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: energy
          multiple: true

    datetime_helper:
      name: Input datetime helper for scheduling next run
      description: >
        This helper is updated by the automation. It schedules the next run to
        avoid frequent changes.
      selector:
        entity:
          filter:
            - domain: input_datetime

    change_frequency:
      name: Delay in minutes after an adjustment until a new adjustment is done
      description: >
        Minutes will be added to the actual time; next adjustment runs after
        this delay.
      default: 15
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: min
          mode: slider

    heating_threshold:
      name: Heating Threshold (°C)
      description: >
        If inside temp is <= this, heating (or ventilation if outside helps) is
        triggered.
      default: 10
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    cooling_threshold:
      name: Cooling Threshold (°C)
      description: >
        If inside temp is >= this, cooling (or ventilation if outside helps) is
        triggered.
      default: 30
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    heating_temperature:
      name: Setpoint for heating (°C)
      description: Used as target temperature when heating via climate entity.
      default: 20
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    cooling_temperature:
      name: Setpoint for cooling (°C)
      description: Used as target temperature when cooling via climate entity.
      default: 26
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    preemptive_heating_threshold:
      name: Preemptive heating threshold (°C)
      description: >
        If inside is below this (but above heating_threshold), preemptive
        heating could be useful.
      default: 18
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    preemptive_heating_stop_threshold:
      name: Stop threshold for preemptive heating (°C)
      description: >
        If inside is above this, preemptive heating won't be triggered.
      default: 26
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    preemptive_cooling_threshold:
      name: Preemptive cooling threshold (°C)
      description: >
        If inside is above this (but below cooling_threshold), preemptive
        cooling could be useful.
      default: 28
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    preemptive_cooling_stop_threshold:
      name: Stop threshold for preemptive cooling (°C)
      description: >
        If inside is below this, preemptive cooling won't be triggered.
      default: 20
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: "°C"
          mode: slider

    ventilation_difference:
      name: Temperature difference (outside vs inside) for ventilation (K)
      description: >
        Outside must be at least this much warmer (for free heating) or cooler
        (for free cooling) than inside before ventilation is started.
      default: 2
      selector:
        number:
          min: 0
          max: 10
          unit_of_measurement: "K"
          mode: slider

    minimum_pv_surplus_for_preemptive_cooling:
      name: Minimum PV Surplus for preemptive cooling (W)
      description: >
        Minimum PV surplus required to use PV energy for cooling.
        NOTE: Ignored if EVCC PV surplus enable is configured.
      default: 500
      selector:
        number:
          min: 100
          max: 5000
          unit_of_measurement: "W"
          mode: slider

    minimum_pv_surplus_for_preemptive_heating:
      name: Minimum PV Surplus for preemptive heating (W)
      description: >
        Minimum PV surplus required to use PV energy for heating.
        NOTE: Ignored if EVCC PV surplus enable is configured.
      default: 500
      selector:
        number:
          min: 100
          max: 5000
          unit_of_measurement: "W"
          mode: slider

    notify_entity:
      name: Notify target (optional)
      description: >
        Optional notify group. If set, sends a push message when mode changes.
      default: []
      selector:
        text: {}

    log_name:
      name: Logbook name
      description: Name used for logbook.log entries.
      default: Climate Control
      selector:
        text: {}

    mode_helper:
      name: Optional helper to store current mode (input_text)
      description: >
        If set, stores the current mode string (HEAT/COOL/VENT/OFF) so you can
        display it in dashboards.
      default: []
      selector:
        entity:
          filter:
            - domain: input_text
          multiple: true

mode: single

variables:
  inside_temperature_sensor: !input inside_temperature_sensor
  outside_temperature_sensor: !input outside_temperature_sensor
  weather_forecast_max_sensor: !input weather_forecast_max_sensor
  pv_surplus_enable_boolean: !input pv_surplus_enable_boolean
  pv_surplus_sensor: !input pv_surplus_sensor
  pv_remaining_surplus_sensor: !input pv_remaining_surplus_sensor
  climate_entity: !input climate_entity
  heater_switch: !input heater_switch
  vent_switch: !input vent_switch
  datetime_helper: !input datetime_helper
  change_frequency: !input change_frequency
  heating_threshold: !input heating_threshold
  cooling_threshold: !input cooling_threshold
  heating_temperature: !input heating_temperature
  cooling_temperature: !input cooling_temperature
  preemptive_heating_threshold: !input preemptive_heating_threshold
  preemptive_heating_stop_threshold: !input preemptive_heating_stop_threshold
  preemptive_cooling_threshold: !input preemptive_cooling_threshold
  preemptive_cooling_stop_threshold: !input preemptive_cooling_stop_threshold
  ventilation_difference: !input ventilation_difference
  minimum_pv_surplus_for_preemptive_cooling: !input minimum_pv_surplus_for_preemptive_cooling
  minimum_pv_surplus_for_preemptive_heating: !input minimum_pv_surplus_for_preemptive_heating
  notify_entity: !input notify_entity
  log_name: !input log_name
  mode_helper: !input mode_helper

  inside_temp: "{{ states(inside_temperature_sensor) | float(default=18) }}"
  outside_temp: "{{ states(outside_temperature_sensor) | float(default=18) }}"
  forecast_max_temp: >-
    {% if weather_forecast_max_sensor is sequence and weather_forecast_max_sensor|length > 0 %}
      {{ states(weather_forecast_max_sensor[0]) | float(default=18) }}
    {% else %}
      {{ 18 }}
    {% endif %}
  pv_surplus_w: >-
    {% if pv_surplus_sensor is sequence and pv_surplus_sensor|length > 0 %}
      {{ states(pv_surplus_sensor[0]) | float(default=0) }}
    {% else %}
      {{ 0 }}
    {% endif %}
  pv_remaining_kwh: >-
    {% if pv_remaining_surplus_sensor is sequence and pv_remaining_surplus_sensor|length > 0 %}
      {{ states(pv_remaining_surplus_sensor[0]) | float(default=0) }}
    {% else %}
      {{ 0 }}
    {% endif %}
  pv_remaining_wh: "{{ (pv_remaining_kwh | float(0)) * 1000 }}"
  pv_needed_wh_for_window: "{{ (minimum_pv_surplus_for_preemptive_heating | float(0)) * (change_frequency | float(0)) / 60 }}"
  pv_needed_wh_for_window_cool: "{{ (minimum_pv_surplus_for_preemptive_cooling | float(0)) * (change_frequency | float(0)) / 60 }}"
  pv_enable_on: >-
    {% if pv_surplus_enable_boolean %}
      {{ is_state(pv_surplus_enable_boolean, 'on') }}
    {% else %}
      {{ none }}
    {% endif %}
  pv_ok_heat: >-
    {% if pv_surplus_enable_boolean %}
      {{ is_state(pv_surplus_enable_boolean, 'on') }}
    {% else %}
      {{ (pv_surplus_w >= minimum_pv_surplus_for_preemptive_heating) and (pv_remaining_wh > pv_needed_wh_for_window) }}
    {% endif %}
  pv_ok_cool: >-
    {% if pv_surplus_enable_boolean %}
      {{ is_state(pv_surplus_enable_boolean, 'on') }}
    {% else %}
      {{ (pv_surplus_w >= minimum_pv_surplus_for_preemptive_cooling) and (pv_remaining_wh > pv_needed_wh_for_window_cool) }}
    {% endif %}
  has_climate: "{{ climate_entity is sequence and climate_entity|length > 0 }}"
  has_heater: "{{ heater_switch is sequence and heater_switch|length > 0 }}"
  has_vent_switch: "{{ vent_switch is sequence and vent_switch|length > 0 }}"
  has_notify: "{{ notify_entity is sequence and notify_entity|length > 0 }}"
  has_mode_helper: "{{ mode_helper is sequence and mode_helper|length > 0 }}"
  desired_mode: "OFF"
  decision_reason: "Init"

trigger:
  - platform: homeassistant
    event: start
    id: ha_start

  - platform: event
    event_type: automation_reloaded
    id: reload

  - platform: time
    at: !input datetime_helper
    id: scheduled

condition:
  - condition: or
    conditions:
      - condition: trigger
        id: scheduled
      - condition: template
        value_template: >-
          {{ now().timestamp() >= as_timestamp(states(datetime_helper), 0) }}

action:
  - variables:
      previous_mode: >-
        {% if has_mode_helper %}
          {{ states(mode_helper[0]) }}
        {% else %}
          unknown
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ inside_temp <= heating_threshold }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp >= preemptive_heating_threshold }}"
                sequence:
                  - variables:
                      desired_mode: "VENT"
                      decision_reason: >-
                        Inside <= heating_threshold ({{ inside_temp }} <= {{ heating_threshold }}),
                        outside >= preemptive_heating_threshold ({{ outside_temp }} >= {{ preemptive_heating_threshold }}) -> VENT
            default:
              - variables:
                  desired_mode: "HEAT"
                  decision_reason: >-
                    Inside <= heating_threshold ({{ inside_temp }} <= {{ heating_threshold }}) -> HEAT

      - conditions:
          - condition: template
            value_template: "{{ inside_temp >= cooling_threshold }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ outside_temp <= preemptive_cooling_threshold }}"
                sequence:
                  - variables:
                      desired_mode: "VENT"
                      decision_reason: >-
                        Inside >= cooling_threshold ({{ inside_temp }} >= {{ cooling_threshold }}),
                        outside <= preemptive_cooling_threshold ({{ outside_temp }} <= {{ preemptive_cooling_threshold }}) -> VENT
            default:
              - variables:
                  desired_mode: "COOL"
                  decision_reason: >-
                    Inside >= cooling_threshold ({{ inside_temp }} >= {{ cooling_threshold }}) -> COOL

      - conditions:
          - condition: template
            value_template: "{{ inside_temp > heating_threshold and inside_temp < cooling_threshold }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ inside_temp < preemptive_heating_threshold }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ outside_temp > (inside_temp + ventilation_difference) }}"
                        sequence:
                          - variables:
                              desired_mode: "VENT"
                              decision_reason: >-
                                Inside < preemptive_heating_threshold ({{ inside_temp }} < {{ preemptive_heating_threshold }}),
                                outside > inside + diff ({{ outside_temp }} > {{ inside_temp }} + {{ ventilation_difference }}) -> VENT (better than nothing)

                      - conditions:
                          - condition: template
                            value_template: "{{ pv_ok_heat }}"
                        sequence:
                          - variables:
                              desired_mode: "HEAT"
                              decision_reason: >-
                                Inside < preemptive_heating_threshold ({{ inside_temp }} < {{ preemptive_heating_threshold }}),
                                PV ok (surplus={{ pv_surplus_w }}W, remaining={{ pv_remaining_wh }}Wh) -> HEAT (PV)
                    default:
                      - variables:
                          desired_mode: "OFF"
                          decision_reason: >-
                            Inside < preemptive_heating_threshold ({{ inside_temp }} < {{ preemptive_heating_threshold }}),
                            no useful ventilation/PV heating -> OFF

              - conditions:
                  - condition: template
                    value_template: "{{ inside_temp > preemptive_cooling_threshold }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ outside_temp < (inside_temp - ventilation_difference) }}"
                        sequence:
                          - variables:
                              desired_mode: "VENT"
                              decision_reason: >-
                                Inside > preemptive_cooling_threshold ({{ inside_temp }} > {{ preemptive_cooling_threshold }}),
                                outside < inside - diff ({{ outside_temp }} < {{ inside_temp }} - {{ ventilation_difference }}) -> VENT (free cooling)

                      - conditions:
                          - condition: template
                            value_template: "{{ pv_ok_cool }}"
                        sequence:
                          - variables:
                              desired_mode: "COOL"
                              decision_reason: >-
                                Inside > preemptive_cooling_threshold ({{ inside_temp }} > {{ preemptive_cooling_threshold }}),
                                PV ok (surplus={{ pv_surplus_w }}W, remaining={{ pv_remaining_wh }}Wh) -> COOL (PV)
                    default:
                      - variables:
                          desired_mode: "OFF"
                          decision_reason: >-
                            Inside > preemptive_cooling_threshold ({{ inside_temp }} > {{ preemptive_cooling_threshold }}),
                            no useful ventilation/PV cooling -> OFF

              - conditions:
                  - condition: template
                    value_template: "{{ inside_temp >= preemptive_heating_threshold and inside_temp <= preemptive_cooling_threshold }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ forecast_max_temp >= preemptive_cooling_threshold }}"
                          - condition: template
                            value_template: "{{ pv_ok_cool }}"
                          - condition: template
                            value_template: "{{ inside_temp > preemptive_cooling_stop_threshold }}"
                        sequence:
                          - variables:
                              desired_mode: "COOL"
                              decision_reason: >-
                                Neutral zone, forecast hot ({{ forecast_max_temp }} >= {{ preemptive_cooling_threshold }}),
                                PV ok, inside > cooling_stop ({{ inside_temp }} > {{ preemptive_cooling_stop_threshold }}) -> COOL (forecast+PV)

                      - conditions:
                          - condition: template
                            value_template: "{{ forecast_max_temp <= preemptive_heating_threshold }}"
                          - condition: template
                            value_template: "{{ pv_ok_heat }}"
                          - condition: template
                            value_template: "{{ inside_temp < preemptive_heating_stop_threshold }}"
                        sequence:
                          - variables:
                              desired_mode: "HEAT"
                              decision_reason: >-
                                Neutral zone, forecast cold ({{ forecast_max_temp }} <= {{ preemptive_heating_threshold }}),
                                PV ok, inside < heating_stop ({{ inside_temp }} < {{ preemptive_heating_stop_threshold }}) -> HEAT (forecast+PV)
                    default:
                      - variables:
                          desired_mode: "OFF"
                          decision_reason: >-
                            Neutral zone: no forecast/PV action -> OFF
            default:
              - variables:
                  desired_mode: "OFF"
                  decision_reason: "Between thresholds: no matching proactive branch -> OFF"
    default:
      - variables:
          desired_mode: "OFF"
          decision_reason: "Default branch -> OFF"

  - variables:
      effective_mode: >-
        {% set m = desired_mode %}
        {% if m == 'HEAT' %}
          {% if has_heater or has_climate %}HEAT{% else %}OFF{% endif %}
        {% elif m == 'COOL' %}
          {% if has_climate %}COOL{% elif has_vent_switch %}VENT{% else %}OFF{% endif %}
        {% elif m == 'VENT' %}
          {% if has_climate or has_vent_switch %}VENT{% else %}OFF{% endif %}
        {% else %}
          OFF
        {% endif %}
      effective_reason: >-
        {% if effective_mode != desired_mode %}
          {{ decision_reason }} | Fallback: desired={{ desired_mode }} -> effective={{ effective_mode }} (missing capability)
        {% else %}
          {{ decision_reason }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ effective_mode == 'HEAT' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_climate }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: "off"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_vent_switch }}"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ vent_switch }}"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_heater }}"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: "{{ heater_switch }}"

              - conditions:
                  - condition: template
                    value_template: "{{ has_climate }}"
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: "heat"
                      temperature: "{{ heating_temperature }}"
                  - action: climate.set_fan_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      fan_mode: "auto"
            default: []

      - conditions:
          - condition: template
            value_template: "{{ effective_mode == 'COOL' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_heater }}"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ heater_switch }}"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_vent_switch }}"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ vent_switch }}"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_climate }}"
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: "cool"
                      temperature: "{{ cooling_temperature }}"
                  - action: climate.set_fan_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      fan_mode: "auto"
            default: []

      - conditions:
          - condition: template
            value_template: "{{ effective_mode == 'VENT' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_heater }}"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ heater_switch }}"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_climate }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ climate_entity }}"
                    data:
                      hvac_mode: "fan_only"
            default: []

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ has_vent_switch }}"
                sequence:
                  - action: switch.turn_on
                    target:
                      entity_id: "{{ vent_switch }}"
            default: []
    default:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ has_heater }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: "{{ heater_switch }}"
        default: []

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ has_vent_switch }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: "{{ vent_switch }}"
        default: []

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ has_climate }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ climate_entity }}"
                data:
                  hvac_mode: "off"
        default: []

  - action: logbook.log
    data:
      name: "{{ log_name }}"
      message: >-
        Mode={{ effective_mode }} | {{ effective_reason }} |
        prev={{ previous_mode }} |
        inside={{ inside_temp }}°C outside={{ outside_temp }}°C forecast_max={{ forecast_max_temp }}°C |
        pv_surplus={{ pv_surplus_w }}W pv_remaining={{ pv_remaining_kwh }}kWh pv_enable={{ pv_enable_on }}
      entity_id: >-
        {% if has_climate %}
          {{ climate_entity[0] }}
        {% elif has_heater %}
          {{ heater_switch[0] }}
        {% elif has_vent_switch %}
          {{ vent_switch[0] }}
        {% else %}
          {{ inside_temperature_sensor }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ has_mode_helper }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: "{{ mode_helper }}"
            data:
              value: "{{ effective_mode }}"
    default: []

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ has_notify and (not has_mode_helper or previous_mode != effective_mode) }}"
        sequence:
          - action: notify.send_message
            data:
              entity_id: "{{ notify_entity }}"
              title: "{{ log_name }}: {{ effective_mode }}"
              message: >-
                {{ effective_reason }}
                (Prev={{ previous_mode }})
                (Inside {{ inside_temp }}°C / Outside {{ outside_temp }}°C / PV {{ pv_surplus_w }}W)
    default: []

  - action: input_datetime.set_datetime
    target:
      entity_id: !input datetime_helper
    data:
      timestamp: "{{ now().timestamp() + (change_frequency | float(0) * 60) }}"
